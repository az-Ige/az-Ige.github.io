<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="icon" type="image/x-icon" href="icon.png" />
  </head>
  <body>
    <style>
      body,
      html {
        margin: 0;
        box-sizing: border-box;
        height: 100%;
        overflow-y: hidden;
      }
      iframe {
        box-sizing: border-box;
        height: 100%;
        width: 100%;
      }
    </style>

    <script defer>
      window.onload = () => {
        haha = localStorage.getItem("curentpdf");
        //<iframe src="filename.pdf" title='SOME_TITLE' sandbox="allow-popups" />
        let iframe = document.createElement("iframe");
        iframe.src = haha;
        iframe.setAttribute("sandbox", "allow-popups");
        iframe.setAttribute("title", "pdfviewer");
        document.body.appendChild(iframe);
      };
    </script>
  </body>
</html>
